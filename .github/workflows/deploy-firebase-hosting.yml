# Деплой Firebase Hosting при пуше в main.
# Добавь в GitHub → Settings → Secrets → Actions:
#   FIREBASE_TOKEN — вывод команды: firebase login:ci
#   (или npx firebase-tools login:ci)

name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy Hosting
        run: npx firebase-tools deploy --only hosting --project talkerj --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
